# action.yml
name: "setup-jemalloc"
description: "An action to download, install, and cache jemalloc on Linux runners (macOS and Windows are currently unsupported)"
author: "Jason Pearson"
inputs:
  jemalloc-version:
    description: "Version of jemalloc to use"
    required: "true"
    default: "5.3.0"
outputs: {}

# Every step is gated on runner.os == 'Linux', so the action is a graceful
# no-op on other runners; macOS and Windows are unsupported (see README).
# scripts/mac/ is kept (and unit-tested) as scaffolding for future macOS work.
runs:
  using: "composite"
  steps:

    - name: "Restore jemalloc"
      if: runner.os == 'Linux'
      id: cache-jemalloc
      uses: actions/cache/restore@v4
      with:
        path: /tmp/libjemalloc.so.2
        key: v7-${{ runner.os }}-jemalloc-${{ inputs.jemalloc-version }}

    - name: "Relocate jemalloc to expected directory"
      if: ${{ runner.os == 'Linux' && steps.cache-jemalloc.outputs.cache-hit == 'true' }}
      shell: bash
      run: |
        # Atomic, idempotent install so a second in-job invocation cannot
        # truncate an LD_PRELOAD'd library in place and crash the copy with
        # SIGSEGV (issue #5).
        bash "${{ github.action_path }}/scripts/linux/relocate.sh" /tmp/libjemalloc.so.2 /usr/local/lib/libjemalloc.so.2

    - name: "Download jemalloc"
      if: ${{ runner.os == 'Linux' && steps.cache-jemalloc.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        curl -Ls https://github.com/jemalloc/jemalloc/releases/download/${{ inputs.jemalloc-version }}/jemalloc-${{ inputs.jemalloc-version }}.tar.bz2 -o jemalloc-${{ inputs.jemalloc-version }}.tar.bz2
        tar xf jemalloc-${{ inputs.jemalloc-version }}.tar.bz2

    - name: "Configure and install jemalloc"
      if: ${{ runner.os == 'Linux' && steps.cache-jemalloc.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        cd jemalloc-${{ inputs.jemalloc-version }}
        # --with-huge-page-size=$(awk '/Hugepagesize:/ {print $2/1024 "MB"}' /proc/meminfo)
        ./configure
        make
        sudo make install
        # Stage the built library for the cache-save step below.
        cp /usr/local/lib/libjemalloc.so.2 /tmp/

    - name: "Configure LD_PRELOAD"
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo 'LD_PRELOAD=/usr/local/lib/libjemalloc.so.2' >> $GITHUB_ENV

    - name: "Save jemalloc"
      uses: actions/cache/save@v4
      if: ${{ runner.os == 'Linux' && steps.cache-jemalloc.outputs.cache-hit != 'true' }}
      with:
        path: /tmp/libjemalloc.so.2
        key: v7-${{ runner.os }}-jemalloc-${{ inputs.jemalloc-version }}

    - name: "Remove download directory"
      if: ${{ runner.os == 'Linux' && steps.cache-jemalloc.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        rm -rf jemalloc-${{ inputs.jemalloc-version }}
        rm -f jemalloc-${{ inputs.jemalloc-version }}.tar.bz2

branding:
  icon: "cpu"
  color: "blue"
